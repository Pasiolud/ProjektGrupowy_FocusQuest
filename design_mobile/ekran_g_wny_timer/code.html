<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#006e1c",
                    "secondary-fixed-dim": "#90d792",
                    "primary-container": "#4caf50",
                    "on-background": "#1a1c1c",
                    "on-secondary-fixed-variant": "#07521d",
                    "inverse-primary": "#78dc77",
                    "primary-fixed-dim": "#78dc77",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed-variant": "#3e4a41",
                    "on-secondary-container": "#2e7238",
                    "inverse-surface": "#2f3131",
                    "tertiary-fixed-dim": "#bdcabe",
                    "secondary": "#286b33",
                    "on-tertiary-fixed": "#131e17",
                    "surface-bright": "#f9f9f9",
                    "outline": "#6f7a6b",
                    "on-primary-fixed-variant": "#005313",
                    "surface-container-highest": "#e2e2e2",
                    "on-surface-variant": "#3f4a3c",
                    "primary-fixed": "#94f990",
                    "on-secondary-fixed": "#002107",
                    "secondary-container": "#abf4ac",
                    "error": "#ba1a1a",
                    "secondary-fixed": "#abf4ac",
                    "on-tertiary-container": "#2a352d",
                    "inverse-on-surface": "#f1f1f1",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#003c0b",
                    "on-secondary": "#ffffff",
                    "surface-container-high": "#e8e8e8",
                    "surface-container": "#eeeeee",
                    "background": "#f9f9f9",
                    "tertiary": "#556158",
                    "surface-variant": "#e2e2e2",
                    "surface-dim": "#dadada",
                    "on-surface": "#1a1c1c",
                    "on-primary-fixed": "#002204",
                    "tertiary-container": "#929e94",
                    "surface-container-low": "#f3f3f3",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "tertiary-fixed": "#d9e6da",
                    "surface": "#f9f9f9",
                    "primary": "#006e1c",
                    "outline-variant": "#becab9",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f9]/85 dark:bg-gray-900/85 backdrop-blur-xl flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#006e1c] dark:text-[#94f990] text-2xl" data-icon="potted_plant">potted_plant</span>
<h1 class="font-['Inter'] tracking-tight font-bold text-lg text-[#006e1c] dark:text-[#94f990]">Focus RPG</h1>
</div>
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-container-low">
<span class="text-xs font-bold tracking-tight text-on-surface-variant">1,250 Coins • Level 12</span>
</div>
</header>
<main class="min-h-screen pt-24 pb-32 px-6 flex flex-col items-center">
<!-- Status Badge -->
<div class="mb-12 bg-surface-container-low px-4 py-2 rounded-full flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Ready to grow</span>
</div>
<!-- Timer Circle -->
<div class="relative w-72 h-72 flex items-center justify-center mb-16">
<!-- Background Ring -->
<svg class="absolute w-full h-full">
<circle class="text-surface-container-highest" cx="144" cy="144" fill="transparent" r="130" stroke="currentColor" stroke-width="8"></circle>
<!-- Progress Ring -->
<circle class="text-primary progress-ring__circle" cx="144" cy="144" fill="transparent" r="130" stroke="currentColor" stroke-dasharray="816.8" stroke-dashoffset="204.2" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="text-center">
<div class="text-7xl font-black tracking-tighter text-on-surface">25:00</div>
<div class="text-sm font-bold uppercase tracking-[0.2em] text-on-surface-variant mt-2">Deep Work</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-sm flex flex-col gap-4">
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-xl flex items-center justify-center gap-3 transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
                Start Session
            </button>
<button class="w-full py-4 text-primary font-bold text-sm uppercase tracking-widest hover:bg-surface-container-low transition-colors rounded-xl active:opacity-80">
                Cancel
            </button>
</div>
<!-- Contextual Card: Inventory / Plants -->
<div class="mt-16 w-full max-w-sm">
<div class="bg-surface-container-low rounded-xl p-6 relative overflow-hidden">
<div class="relative z-10">
<h3 class="text-on-surface font-bold text-lg mb-1">Oak Seedling</h3>
<p class="text-on-surface-variant text-sm mb-4">Focus 25 minutes to grow this plant into your digital garden.</p>
<div class="flex gap-2">
<span class="px-2 py-1 bg-surface-container-highest rounded text-[10px] font-bold uppercase text-on-surface-variant">+50 XP</span>
<span class="px-2 py-1 bg-surface-container-highest rounded text-[10px] font-bold uppercase text-on-surface-variant">+20 Coins</span>
</div>
</div>
<div class="absolute -right-4 -bottom-4 opacity-10">
<span class="material-symbols-outlined text-[120px]" data-icon="nature">nature</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-[#f9f9f9] dark:bg-gray-950 border-t border-[#becab9]/15 shadow-[0_-4px_32px_rgba(26,28,28,0.1)] flex justify-around items-center h-20 px-4 pb-safe w-full">
<!-- Active Tab: Timer -->
<a class="flex flex-col items-center justify-center bg-[#4caf50] text-[#003c0b] rounded-2xl px-5 py-1.5 Active: scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="timer" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-['Inter'] uppercase tracking-widest text-[10px] font-bold mt-1">Timer</span>
</a>
<a class="flex flex-col items-center justify-center text-[#3f4a3c] dark:text-gray-400 px-5 py-1.5 hover:bg-[#f3f3f3] dark:hover:bg-gray-800 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] uppercase tracking-widest text-[10px] font-bold mt-1">Profile</span>
</a>
<a class="flex flex-col items-center justify-center text-[#3f4a3c] dark:text-gray-400 px-5 py-1.5 hover:bg-[#f3f3f3] dark:hover:bg-gray-800 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="redeem">redeem</span>
<span class="font-['Inter'] uppercase tracking-widest text-[10px] font-bold mt-1">Shop</span>
</a>
</nav>
</body></html>
