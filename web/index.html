<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusQuest</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Widok Auth (Logowanie / Rejestracja) -->
      <div id="auth-view" class="view active">
        <div class="auth-card">
          <div class="auth-header">
            <h1 class="logo-font">FocusQuest</h1>
            <p id="auth-subtitle">Zaloguj się do swojego zadania</p>
          </div>
          
          <form id="auth-form">
            <div class="input-group">
              <label for="email">E-mail</label>
              <input type="email" id="email" required placeholder="twój@email.com" />
            </div>
            
            <div class="input-group">
              <label for="password">Hasło</label>
              <input type="password" id="password" required placeholder="Min. 6 znaków" />
            </div>

            <div class="input-group" id="confirm-password-group" style="display: none;">
              <label for="confirm-password">Potwierdź hasło</label>
              <input type="password" id="confirm-password" placeholder="Min. 6 znaków" />
            </div>

            <button type="submit" id="auth-submit-btn" class="btn-primary">
              Wejdź do Gry
            </button>
            <div id="auth-error-msg" class="error-msg"></div>
          </form>

          <div class="auth-toggle">
            <span id="auth-toggle-text">Nie masz konta?</span>
            <button id="auth-toggle-btn" class="btn-text">Zarejestruj się</button>
          </div>
        </div>
      </div>

      <!-- Dashboard View (widoczny po zalogowaniu) -->
      <div id="dashboard-view" class="view">
        <header class="dashboard-header">
          <h1 class="logo-font">FocusQuest</h1>
          <button id="logout-btn" class="btn-secondary">Wyloguj</button>
        </header>
        <main class="dashboard-content">
          <div class="welcome-card">
            <h2>Witaj, Kadecie!</h2>
            <p>Jesteś zalogowany jako: <span id="user-email-display" class="highlight"></span></p>
            <div class="placeholder-content">
              Twój panel powrotu do skupienia wkrótce będzie gotowy.
            </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
